document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"de\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=1440\">\n\n<title>moms of hamburg — built your own village<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f8a89e91-8224-4a43-8fcd-ffc58d0b5c1d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f3f9b259-3fd8-4932-9305-09971e4e3a4d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a34e15fa-48b2-4cd5-b731-f57ed281af8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"1bdd2dbe-44ff-4f09-bb5b-31cda0a42f6a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin */\n@font-face {\n  font-family: 'Sansita One';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"0ac16e8f-244a-4a4a-b0c7-516b0ab70a01\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"484c9383-adb0-472f-af03-a4a5acabaf3b\"><\u002Fscript>\n<style>\n  :root{\n    --orange:#F76317;\n    --orange-deep:#E55411;\n    --cream:#FFFFFF;\n    --cream-soft:#FFF6EE;\n    --ink:#2A1206;\n    --serif:\"DM Serif Display\", \"Times New Roman\", serif;\n    --logo:\"Sansita One\", \"Cooper Black\", \"Georgia\", serif;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{background:var(--orange);color:var(--cream);font-family:var(--serif);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n  html{scroll-behavior:smooth;}\n  body{overflow-x:hidden;}\n  ::selection{background:var(--cream);color:var(--orange);}\n\n  /* ---------- TOP NAV ---------- */\n  .nav{\n    position:fixed;top:0;left:0;right:0;z-index:50;\n    display:flex;align-items:center;justify-content:space-between;\n    padding:18px 36px;\n    pointer-events:none;\n    transition:background .3s ease, backdrop-filter .3s ease, padding .3s ease, border-color .3s ease;\n    border-bottom:1px solid transparent;\n  }\n  .nav.scrolled{\n    background:rgba(247,99,23,.72);\n    backdrop-filter:saturate(140%) blur(14px);\n    -webkit-backdrop-filter:saturate(140%) blur(14px);\n    border-bottom-color:rgba(255,255,255,.18);\n    padding:12px 36px;\n  }\n  @media (max-width:720px){\n    .nav.scrolled{padding:10px 18px;}\n  }\n  .nav .mark{\n    font-family:var(--logo);font-size:22px;line-height:.85;color:var(--cream);\n    letter-spacing:-.01em;pointer-events:auto;\n  }\n  .nav .mark span{display:block;}\n  .nav .menu{\n    display:flex;gap:28px;font-family:var(--serif);font-size:15px;color:var(--cream);\n    letter-spacing:.02em;pointer-events:auto;\n  }\n  .nav .menu a{color:inherit;text-decoration:none;opacity:.85;transition:opacity .2s;}\n  .nav .menu a:hover{opacity:1;}\n  .nav .cta{\n    pointer-events:auto;\n    background:var(--cream);color:var(--orange);\n    font-family:var(--serif);font-size:14px;\n    padding:10px 18px;border-radius:999px;border:0;cursor:pointer;\n    letter-spacing:.02em;\n    transition:transform .2s ease, background .2s;\n  }\n  .nav .cta:hover{transform:translateY(-1px);}\n  @media (max-width:720px){\n    .nav{padding:16px 18px;}\n    .nav .menu{display:none;}\n  }\n\n  /* ---------- HERO ---------- */\n  .hero{\n    min-height:100vh;\n    display:flex;flex-direction:column;align-items:center;justify-content:center;\n    position:relative;text-align:center;padding:120px 24px 80px;\n    overflow:hidden;\n  }\n  .hero-eyebrow{\n    font-family:var(--serif);font-style:italic;font-size:clamp(15px,2vw,20px);\n    opacity:.9;margin-bottom:28px;letter-spacing:.02em;\n  }\n  .wordmark{\n    font-family:var(--logo);\n    line-height:.86;\n    font-size:clamp(64px, 16vw, 240px);\n    letter-spacing:-.02em;\n    text-align:center;\n    color:var(--cream);\n    will-change:transform;\n    position:relative;\n  }\n  .wordmark .row{display:block;}\n  .wordmark .row.b{padding-left:.08em;}\n  .built{\n    position:absolute;\n    right:clamp(-4px,2vw,40px);\n    top:clamp(2px,1vw,12px);\n    font-family:var(--serif);\n    font-style:normal;font-weight:400;\n    font-size:clamp(11px,1.1vw,15px);\n    line-height:1.05;letter-spacing:.08em;\n    text-transform:uppercase;text-align:left;\n    color:var(--cream);\n  }\n  .built .heart{display:block;margin-top:6px;font-size:1.4em;line-height:1;}\n  .hero-sub{\n    margin-top:48px;max-width:680px;\n    font-family:var(--serif);font-size:clamp(18px,1.6vw,24px);\n    line-height:1.45;opacity:.95;text-wrap:pretty;\n  }\n  .hero-sub em{font-style:italic;}\n  .scroll-hint{\n    position:absolute;bottom:30px;left:50%;transform:translateX(-50%);\n    font-family:var(--serif);font-style:italic;font-size:14px;opacity:.7;\n    letter-spacing:.04em;\n    animation:bob 2.6s ease-in-out infinite;\n  }\n  @keyframes bob{\n    0%,100%{transform:translate(-50%,0);opacity:.55;}\n    50%{transform:translate(-50%,8px);opacity:.95;}\n  }\n\n  /* ---------- GENERIC SECTION ---------- */\n  section{position:relative;}\n  .container{max-width:1100px;margin:0 auto;padding:0 28px;}\n\n  /* Pinned BIG headline that reveals while scrolling */\n  .pinwrap{position:relative;height:140vh;}\n  .pinwrap .pin{\n    position:sticky;top:0;height:100vh;\n    display:flex;align-items:center;justify-content:center;\n    text-align:center;padding:0 24px;\n  }\n  .story-body{\n    padding:40px 24px 140px;\n    position:relative;\n    background:var(--orange);\n    z-index:2;\n  }\n\n  h2.big{\n    font-family:var(--serif);\n    font-weight:400;\n    font-size:clamp(48px,9vw,150px);\n    line-height:1.02;\n    letter-spacing:-.02em;\n    /* explicit <br/>s control wrapping; balance would fight the inline-block word wrappers */\n    color:var(--cream);\n    max-width:14ch;\n  }\n  h2.big em{font-style:italic;font-family:var(--serif);}\n  /* word-stagger reveal for big headlines */\n  h2.big .hw{\n    display:inline-block;\n    opacity:0;\n    transform:translateY(28px);\n    filter:blur(6px);\n    transition:opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1), filter .9s ease;\n  }\n  h2.big.in .hw{opacity:1;transform:none;filter:blur(0);}\n\n  /* Body lines */\n  .lines{\n    display:flex;flex-direction:column;align-items:center;gap:10px;\n    text-align:center;\n    font-family:var(--serif);\n    font-size:clamp(22px,2.6vw,38px);\n    line-height:1.32;\n    max-width:18ch;\n    margin:0 auto;\n  }\n  .lines.wide{max-width:24ch;}\n  /* word-by-word reveal — each word slides up + un-blurs with stagger */\n  .lines .l{display:block;}\n  .lines .l .lw{\n    display:inline-block;\n    opacity:0;\n    transform:translateY(14px);\n    filter:blur(5px);\n    transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1), filter .7s ease;\n  }\n  .lines.in .l .lw{opacity:1;transform:none;filter:blur(0);}\n  .lines em{font-style:italic;}\n\n  /* small italic label above big headline */\n  .eyebrow{\n    font-family:var(--serif);font-style:italic;\n    font-size:clamp(14px,1.2vw,18px);\n    letter-spacing:.06em;\n    opacity:.8;\n    margin-bottom:24px;\n    text-transform:lowercase;\n  }\n  .center{display:flex;flex-direction:column;align-items:center;text-align:center;}\n\n  /* MARQUEE band */\n  .band{\n    overflow:hidden;border-top:1px solid rgba(255,255,255,.35);\n    border-bottom:1px solid rgba(255,255,255,.35);\n    padding:24px 0;margin:0;\n    background:var(--orange);\n  }\n  .marquee{display:flex;gap:64px;width:max-content;\n    animation:marquee 38s linear infinite;\n    font-family:var(--logo);font-size:clamp(36px,5vw,72px);line-height:1;\n    color:var(--cream);\n    letter-spacing:-.01em;\n  }\n  .marquee span{white-space:nowrap;display:inline-flex;align-items:center;gap:64px;}\n  .marquee span::after{content:\"❤\";font-family:var(--serif);font-style:normal;font-size:.6em;display:inline-block;transform:translateY(-.1em);}\n  @keyframes marquee{\n    from{transform:translateX(0);}\n    to{transform:translateX(-50%);}\n  }\n\n  /* Stadtteil chips inside CTA */\n  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:28px;max-width:720px;}\n  .chip{\n    border:1px solid rgba(255,255,255,.55);\n    color:var(--cream);background:transparent;\n    font-family:var(--serif);font-size:15px;\n    padding:10px 16px;border-radius:999px;cursor:pointer;\n    transition:background .2s, color .2s, transform .15s;\n    letter-spacing:.01em;\n  }\n  .chip:hover{background:var(--cream);color:var(--orange);transform:translateY(-1px);}\n  .chip.active{background:var(--cream);color:var(--orange);}\n\n  /* CTA form */\n  .cta-form{\n    display:flex;gap:10px;flex-wrap:wrap;justify-content:center;\n    margin-top:36px;width:100%;max-width:560px;margin-left:auto;margin-right:auto;\n  }\n  .cta-form input{\n    flex:1 1 280px;min-width:220px;\n    background:transparent;border:1.5px solid var(--cream);\n    color:var(--cream);font-family:var(--serif);font-size:18px;\n    padding:14px 18px;border-radius:999px;outline:none;\n  }\n  .cta-form input::placeholder{color:rgba(255,255,255,.7);font-style:italic;}\n  .cta-form button{\n    background:var(--cream);color:var(--orange);\n    border:0;cursor:pointer;\n    font-family:var(--serif);font-size:18px;\n    padding:14px 24px;border-radius:999px;\n    transition:transform .2s;\n  }\n  .cta-form button:hover{transform:translateY(-1px);}\n\n  /* FOOTER */\n  footer{\n    padding:80px 24px 50px;\n    text-align:center;\n  }\n  footer .footmark{\n    font-family:var(--logo);line-height:.86;\n    font-size:clamp(56px,10vw,130px);letter-spacing:-.02em;\n    position:relative;display:inline-block;\n  }\n  footer .footmark .b{padding-left:.08em;}\n  footer .meta{\n    margin-top:30px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap;\n    font-family:var(--serif);font-size:14px;opacity:.75;\n  }\n  footer .meta a{color:inherit;text-decoration:none;}\n\n  /* SECTION DIVIDER (thin line) */\n  .rule{\n    width:60px;height:1.5px;background:var(--cream);opacity:.7;\n    margin:0 auto 30px;border-radius:2px;\n  }\n\n  /* Scroll-driven scale for italic words — kept subtle so it never overlaps the line below */\n  .grow{display:inline-block;transition:transform 1s cubic-bezier(.2,.8,.2,1);transform-origin:left center;}\n  .in-view .grow{transform:scale(1.025);}\n\n  /* Pin headline fades out near the end of its section so it never overlaps */\n  .pinwrap .pin{transition:opacity .25s ease-out;will-change:opacity;}\n\n  /* ---------- ROTATING HERO BADGE ---------- */\n  .badge{\n    position:absolute;\n    top:9vh;right:4vw;\n    width:140px;height:140px;\n    display:flex;align-items:center;justify-content:center;\n    animation:spin 22s linear infinite;\n    z-index:5;\n  }\n  .badge svg{width:100%;height:100%;}\n  .badge .dot{\n    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;\n    font-family:var(--serif);font-style:italic;font-size:22px;\n  }\n  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}\n\n  /* ---------- EDITORIAL NUMBERS ---------- */\n  .num{\n    font-family:var(--serif);font-style:italic;\n    font-size:clamp(80px,14vw,180px);line-height:.9;\n    opacity:.18;letter-spacing:-.02em;\n    position:absolute;\n    pointer-events:none;user-select:none;\n  }\n\n  /* ---------- ORNAMENTAL DIVIDER ---------- */\n  .orn{\n    display:flex;align-items:center;justify-content:center;gap:18px;\n    padding:60px 24px;opacity:.85;\n  }\n  .orn .line{width:60px;height:1px;background:var(--cream);opacity:.6;}\n  .orn .star{\n    font-family:var(--serif);font-size:28px;line-height:1;\n    transform:translateY(-2px);\n  }\n\n  /* ---------- EVENTS SECTION ---------- */\n  .events{padding:140px 28px 160px;position:relative;}\n  .events-head{\n    display:flex;justify-content:space-between;align-items:flex-end;\n    max-width:1100px;margin:0 auto 56px;\n    gap:24px;flex-wrap:wrap;\n  }\n  .events-head h2{\n    font-family:var(--serif);font-size:clamp(44px,7vw,110px);\n    line-height:.94;letter-spacing:-.02em;max-width:11ch;\n  }\n  .events-head h2 em{font-style:italic;}\n  .events-head .lead{\n    font-family:var(--serif);font-style:italic;font-size:18px;\n    max-width:280px;opacity:.9;line-height:1.4;text-align:right;\n  }\n  .event-list{max-width:1100px;margin:0 auto;border-top:1.5px solid rgba(255,255,255,.55);}\n  .event{\n    display:grid;\n    grid-template-columns:60px 1fr 1.2fr 110px 130px;\n    align-items:center;gap:24px;\n    padding:28px 8px;\n    border-bottom:1.5px solid rgba(255,255,255,.55);\n    transition:padding .25s ease, background .25s ease;\n    cursor:pointer;position:relative;\n  }\n  .event:hover{padding-left:24px;background:rgba(255,255,255,.04);}\n  .event .e-num{font-family:var(--serif);font-style:italic;font-size:22px;opacity:.7;}\n  .event .e-title{font-family:var(--serif);font-size:clamp(24px,3vw,36px);line-height:1.05;letter-spacing:-.01em;}\n  .event .e-title em{font-style:italic;}\n  .event .e-place{font-family:var(--serif);font-style:italic;font-size:18px;opacity:.9;}\n  .event .e-date{font-family:var(--logo);font-size:22px;line-height:1;letter-spacing:-.01em;text-align:right;}\n  .event .e-rsvp{\n    justify-self:end;\n    border:1.5px solid var(--cream);background:transparent;color:var(--cream);\n    font-family:var(--serif);font-size:15px;\n    padding:10px 18px;border-radius:999px;cursor:pointer;\n    transition:background .2s,color .2s;\n  }\n  .event .e-rsvp:hover,.event .e-rsvp.on{background:var(--cream);color:var(--orange);}\n  @media (max-width:820px){\n    .event{grid-template-columns:1fr;gap:6px;padding:22px 8px;}\n    .event .e-rsvp{justify-self:start;margin-top:8px;}\n    .event .e-date{text-align:left;}\n  }\n  .events-foot{\n    max-width:1100px;margin:36px auto 0;\n    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;\n    font-family:var(--serif);font-style:italic;font-size:16px;opacity:.85;\n  }\n  .events-foot a{color:var(--cream);text-decoration:underline;text-underline-offset:4px;}\n\n  /* ---------- INSTAGRAM SECTION ---------- */\n  .insta{\n    padding:160px 28px;text-align:center;position:relative;overflow:hidden;\n  }\n  .insta .marker{\n    font-family:var(--serif);font-style:italic;font-size:16px;\n    letter-spacing:.12em;text-transform:uppercase;opacity:.85;\n    margin-bottom:30px;\n  }\n  .insta-handle{\n    font-family:var(--logo);\n    font-size:clamp(56px,12vw,180px);line-height:.86;letter-spacing:-.02em;\n    display:inline-block;position:relative;\n  }\n  .insta-handle .at{font-family:var(--serif);font-style:italic;font-weight:400;}\n  .insta-sub{\n    font-family:var(--serif);font-style:italic;\n    font-size:clamp(20px,2.4vw,30px);\n    max-width:24ch;margin:32px auto 40px;line-height:1.4;\n  }\n  .insta-btn{\n    display:inline-flex;align-items:center;gap:14px;\n    background:var(--cream);color:var(--orange);\n    font-family:var(--serif);font-size:22px;\n    padding:18px 32px;border-radius:999px;\n    text-decoration:none;\n    transition:transform .2s ease, gap .2s ease;\n    border:0;\n  }\n  .insta-btn:hover{transform:translateY(-2px);gap:20px;}\n  .insta-btn svg{width:24px;height:24px;}\n  .insta-tape{\n    margin-top:80px;\n    border-top:1.5px solid rgba(255,255,255,.55);\n    border-bottom:1.5px solid rgba(255,255,255,.55);\n    padding:14px 0;overflow:hidden;\n    transform:rotate(-2deg);\n    margin-left:-5%;margin-right:-5%;\n  }\n  .insta-tape .marquee{font-size:clamp(22px,3vw,40px);gap:36px;animation-duration:24s;}\n  .insta-tape .marquee span::after{content:\"@\";font-style:italic;}\n\n  /* ---------- INSTAGRAM PROFILE CARD ---------- */\n  .ig-card{\n    max-width:980px;margin:64px auto 0;\n    background:var(--cream);color:var(--ink);\n    border-radius:24px;\n    padding:32px 36px;\n    text-align:left;\n    box-shadow:0 24px 60px -30px rgba(20,5,0,.4);\n  }\n  .ig-header{\n    display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:center;\n    padding-bottom:24px;\n    border-bottom:1px solid rgba(42,18,6,.12);\n  }\n  .ig-avatar{\n    width:96px;height:96px;border-radius:50%;\n    background:var(--orange);\n    display:flex;align-items:center;justify-content:center;\n    font-family:var(--logo);font-size:28px;color:var(--cream);\n    line-height:1;letter-spacing:-.02em;\n    box-shadow:0 0 0 4px var(--cream), 0 0 0 6px var(--orange);\n    flex-shrink:0;\n    overflow:hidden;\n  }\n  .ig-avatar image-slot{width:100%;height:100%;}\n  .ig-meta{display:flex;flex-direction:column;gap:8px;min-width:0;}\n  .ig-handle{\n    font-family:var(--logo);font-size:clamp(24px,3vw,32px);line-height:1;\n    color:var(--ink);letter-spacing:-.01em;\n  }\n  .ig-handle .at{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--orange);}\n  .ig-bio{\n    font-family:var(--serif);font-size:15px;line-height:1.4;color:var(--ink);opacity:.85;\n    max-width:46ch;\n  }\n  .ig-bio em{font-style:italic;}\n  .ig-follow{\n    background:var(--orange);color:var(--cream);border:0;cursor:pointer;\n    font-family:var(--serif);font-size:15px;\n    padding:10px 20px;border-radius:999px;\n    text-decoration:none;display:inline-flex;align-items:center;gap:8px;\n    transition:transform .2s, background .2s;\n    flex-shrink:0;\n  }\n  .ig-follow:hover{transform:translateY(-1px);background:var(--orange-deep);}\n  @media (max-width:680px){\n    .ig-card{padding:22px 20px;border-radius:18px;}\n    .ig-header{grid-template-columns:auto 1fr;gap:16px;}\n    .ig-follow{grid-column:1 / -1;justify-content:center;}\n    .ig-avatar{width:72px;height:72px;font-size:22px;}\n  }\n  .ig-grid{\n    display:grid;grid-template-columns:repeat(3,1fr);gap:6px;\n    margin-top:24px;\n  }\n  .ig-tile{\n    position:relative;aspect-ratio:1;\n    background:var(--cream-soft);\n    overflow:hidden;\n    border-radius:6px;\n  }\n  .ig-tile image-slot{width:100%;height:100%;}\n  .ig-tile .tag{\n    position:absolute;left:10px;bottom:10px;z-index:2;\n    font-family:var(--serif);font-style:italic;font-size:13px;\n    color:var(--cream);\n    text-shadow:0 1px 8px rgba(0,0,0,.45);\n    pointer-events:none;\n    letter-spacing:.02em;\n  }\n  .ig-tile .icon{\n    position:absolute;right:10px;top:10px;z-index:2;\n    color:var(--cream);opacity:.92;\n    pointer-events:none;\n    filter:drop-shadow(0 1px 6px rgba(0,0,0,.45));\n  }\n  .ig-tile .icon svg{width:18px;height:18px;display:block;}\n  @media (max-width:540px){\n    .ig-grid{gap:4px;}\n    .ig-tile .tag{font-size:11px;left:8px;bottom:8px;}\n  }\n  .ig-foot{\n    margin-top:18p ============= ORT WERDEN FÜR ===================== -->\n<section class=\"pinwrap\" data-rail=\"ort\">\n  <div class=\"pin\">\n    <div class=\"center\">\n      <div class=\"eyebrow\">06 — unser versprechen<\u002Fdiv>\n      <h2 class=\"big\"><em class=\"grow\">moms of<br>hamburg<\u002Fem><br>soll ein ort<br>werden für …<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section class=\"story-body\">\n  <div class=\"rule\"><\u002Fdiv>\n  <div class=\"lines\" data-reveal=\"\">\n    <span class=\"l\">ehrliche <em>connection<\u002Fem><\u002Fspan>\n    <span class=\"l\">echte mütter<\u002Fspan>\n    <span class=\"l\">echte treffen<\u002Fspan>\n    <span class=\"l\">echte alltage<\u002Fspan>\n    <span class=\"l\">kein druck<\u002Fspan>\n    <span class=\"l\">kein perfekt sein<\u002Fspan>\n    <span class=\"l\">kein „so müsste mutterschaft aussehen\"<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"pq\" data-rail=\"quote\">\n  <div class=\"pq-grid\">\n    <div class=\"pq-meta\">ein gedanke<br>zwischendurch — 2026<\u002Fdiv>\n    <p class=\"pq-quote\">\n      <span class=\"mark\">„<\u002Fspan>vielleicht wird <em>das hier<\u002Fem> genau das <em>village,<\u002Fem> das so vielen gefehlt hat.<span class=\"mark\" style=\"transform:translateY(.5em);\">\"<\u002Fspan>\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== INSTAGRAM ===================== -->\n<section class=\"insta\" data-rail=\"insta\">\n  <div class=\"marker\">follow along · daily updates · meet-ups<\u002Fdiv>\n  <a class=\"insta-handle\" href=\"https://www.instagram.com/momsofhamburg\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;color:inherit;\">\n    <span class=\"at\">@<\u002Fspan>momsofhamburg\n  <\u002Fa>\n  <p class=\"insta-sub\">alle treffen, sprachnachrichten &amp; spontane plays werden auf instagram gedroppt.<\u002Fp>\n\n  <!-- profile card with drag-drop tiles — zieh deine Insta-Screenshots in die Felder rein, sie bleiben gespeichert -->\n  <div class=\"ig-card\" aria-label=\"Instagram Vorschau\">\n    <div class=\"ig-header\">\n      <div class=\"ig-avatar\">\n        <image-slot id=\"ig-avatar\" shape=\"circle\" placeholder=\"logo / avatar\"><\u002Fimage-slot>\n      <\u002Fdiv>\n      <div class=\"ig-meta\">\n        <div class=\"ig-handle\"><span class=\"at\">@<\u002Fspan>momsofhamburg<\u002Fdiv>\n        <div class=\"ig-bio\">eine community für mütter aus hamburg — <em>connection statt vergleichen.<\u002Fem> treffen, walks &amp; spielplatz-dates ♥<\u002Fdiv>\n      <\u002Fdiv>\n      <a class=\"ig-follow\" href=\"https://www.instagram.com/momsofhamburg\" target=\"_blank\" rel=\"noopener\">\n        <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"2\" width=\"20\" height=\"20\" rx=\"5\"><\u002Frect><path d=\"M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z\"><\u002Fpath><line x1=\"17.5\" y1=\"6.5\" x2=\"17.51\" y2=\"6.5\"><\u002Fline><\u002Fsvg>\n        folgen\n      <\u002Fa>\n    <\u002Fdiv>\n    <div class=\"ig-grid\">\n      <div class=\"ig-tile\">\n        <image-slot id=\"ig-post-1\" placeholder=\"post 1\"><\u002Fimage-slot>\n        <span class=\"icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><rect x=\"7\" y=\"7\" width=\"14\" height=\"14\" rx=\"2\"><\u002Frect><\u002Fsvg><\u002Fspan>\n        <span class=\"tag\">spielplatz-date<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ig-tile\">\n        <image-slot id=\"ig-post-2\" placeholder=\"post 2\"><\u002Fimage-slot>\n        <span class=\"icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"6,4 20,12 6,20\"><\u002Fpolygon><\u002Fsvg><\u002Fspan>\n        <span class=\"tag\">after work walk<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ig-tile\">\n        <image-slot id=\"ig-post-3\" placeholder=\"post 3\"><\u002Fimage-slot>\n        <span class=\"tag\">kaffee &amp; kinderwagen<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ig-tile\">\n        <image-slot id=\"ig-post-4\" placeholder=\"post 4\"><\u002Fimage-slot>\n        <span class=\"icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><rect x=\"7\" y=\"7\" width=\"14\" height=\"14\" rx=\"2\"><\u002Frect><\u002Fsvg><\u002Fspan>\n        <span class=\"tag\">mama-brunch<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ig-tile\">\n        <image-slot id=\"ig-post-5\" placeholder=\"post 5\"><\u002Fimage-slot>\n        <span class=\"tag\">stadtpark-picknick<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ig-tile\">\n        <image-slot id=\"ig-post-6\" placeholder=\"post 6\"><\u002Fimage-slot>\n        <span class=\"icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"6,4 20,12 6,20\"><\u002Fpolygon><\u002Fsvg><\u002Fspan>\n        <span class=\"tag\">sprachnachricht<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ig-foot\">zieh deine post-screenshots in die felder — bleibt gespeichert<\u002Fdiv>\n  <\u002Fdiv>\n\n  <a class=\"insta-btn\" style=\"margin-top:48px;\" href=\"https://www.instagram.com/momsofhamburg\" target=\"_blank\" rel=\"noopener\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"2\" width=\"20\" height=\"20\" rx=\"5\"><\u002Frect><path d=\"M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z\"><\u002Fpath><line x1=\"17.5\" y1=\"6.5\" x2=\"17.51\" y2=\"6.5\"><\u002Fline><\u002Fsvg>\n    auf instagram folgen\n  <\u002Fa>\n  <div class=\"insta-tape\" aria-hidden=\"true\">\n    <div class=\"marquee\">\n      <span>momsofhamburg<\u002Fspan><span>momsofhamburg<\u002Fspan><span>momsofhamburg<\u002Fspan><span>momsofhamburg<\u002Fspan><span>momsofhamburg<\u002Fspan><span>momsofhamburg<\u002Fspan><span>momsofhamburg<\u002Fspan><span>momsofhamburg<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== CTA — JOIN ===================== -->\n<section id=\"join\" style=\"padding:80px 24px 160px;text-align:center;position:relative;\" data-rail=\"join\">\n  <div class=\"center\">\n    <div class=\"eyebrow\">07 — komm mit<\u002Fdiv>\n    <h2 class=\"big\" style=\"max-width:18ch;\">das hier soll<br><em class=\"grow\">wachsen.<\u002Fem><br>mit euch.<\u002Fh2>\n\n    <p style=\"margin-top:38px;max-width:30ch;font-size:clamp(18px,1.6vw,22px);line-height:1.45;opacity:.95;\">\n      mehr connection, mehr gemeinschaft, mehr echte moms aus hamburg.<br>\n      lass deine mail da &amp; sei von anfang an dabei <em>♥<\u002Fem>\n    <\u002Fp>\n\n    <div class=\"cta-form\" style=\"margin-top:36px;\">\n      <input type=\"email\" id=\"hood\" placeholder=\"deine e-mail …\" required=\"\">\n      <button type=\"button\" onclick=\"joinSubmit()\">dabei sein<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"join-meta\">\n      <span><strong>kein spam<\u002Fstrong><\u002Fspan>\n      <span class=\"dot\"><\u002Fspan>\n      <span>nur die einladungen zu meet-ups<\u002Fspan>\n      <span class=\"dot\"><\u002Fspan>\n      <span>jederzeit abbestellbar<\u002Fspan>\n    <\u002Fdiv>\n\n    <p id=\"thanks\" style=\"margin-top:22px;font-style:italic;font-size:17px;opacity:0;transition:opacity .5s;\">\n      yay — willkommen im village ♥\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FOOTER ===================== -->\n<footer>\n  <div class=\"footmark\">\n    <span class=\"row a\">moms of<\u002Fspan><br>\n    <span class=\"row b\">hamburg<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"meta\">\n    <span>built with ♥ in hamburg<\u002Fspan>\n    <a href=\"#top\">↑ nach oben<\u002Fa>\n    <a href=\"#join\">dabei sein<\u002Fa>\n    <span>© 2026<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  /* ---- Hero wordmark parallax / scale ---- */\n  const wordmark = document.getElementById('wordmark');\n  const navEl = document.querySelector('.nav');\n  function heroFx(){\n    const y = Math.max(0, window.scrollY);\n    const max = window.innerHeight;\n    const t = Math.min(1, y / max);\n    wordmark.style.transform = `translateY(${y * -0.18}px) scale(${1 + t*0.04})`;\n    wordmark.style.opacity = (1 - t * 0.6).toFixed(3);\n    // Nav gets a translucent backdrop once we leave the hero, so headlines can pass behind it cleanly.\n    if(navEl) navEl.classList.toggle('scrolled', y > 80);\n  }\n  window.addEventListener('scroll', heroFx, {passive:true});\n  heroFx();\n\n  /* ---- Word-split helper: wraps every word in <span class=\"...\"> with staggered delay,\n         preserving inline tags (em) and <br>. ---- */\n  function wrapWords(root, cls, stepMs, baseMs){\n    baseMs = baseMs || 0;\n    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);\n    const nodes = [];\n    while(walker.nextNode()) nodes.push(walker.currentNode);\n    let i = 0;\n    nodes.forEach(tn=>{\n      if(!tn.nodeValue.trim()) return;\n      const parts = tn.nodeValue.split(/(\\s+)/);\n      const frag = document.createDocumentFragment();\n      parts.forEach(p=>{\n        if(p === '') return;\n        if(/^\\s+$/.test(p)){\n          frag.appendChild(document.createTextNode(p));\n        } else {\n          const sp = document.createElement('span');\n          sp.className = cls;\n          sp.textContent = p;\n          sp.style.transitionDelay = (baseMs + i*stepMs)+'ms';\n          i++;\n          frag.appendChild(sp);\n        }\n      });\n      tn.parentNode.replaceChild(frag, tn);\n    });\n  }\n  // Apply word-split to every big headline and every body line\n  document.querySelectorAll('h2.big').forEach(h=>wrapWords(h, 'hw', 70));\n  document.querySelectorAll('.lines').forEach(ls=>{\n    [...ls.querySelectorAll('.l')].forEach((l, idx)=>{\n      // each line starts a bit later than the previous \\u2014 reads top-down\n      wrapWords(l, 'lw', 45, idx * 160);\n    });\n  });\n  // Trigger headline reveal as the pin section enters viewport\n  const hio = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });\n  }, {threshold:0.35});\n  document.querySelectorAll('h2.big').forEach(h=>hio.observe(h));\n\n  /* ---- Pin headlines fade out as their pinwrap section ends ---- */\n  function updatePins(){\n    const vh = window.innerHeight;\n    document.querySelectorAll('.pinwrap').forEach(section=>{\n      const pin = section.querySelector('.pin');\n      if(!pin) return;\n      const rect = section.getBoundingClientRect();\n      const bottom = rect.bottom;\n      const top = rect.top;\n      // fade out window: bottom from 60vh → 0 maps to 1 → 0\n      const fadeOutStart = vh * 0.6;\n      let outOp = 1;\n      if(bottom >= fadeOutStart) outOp = 1;\n      else if(bottom <= 0) outOp = 0;\n      else outOp = bottom / fadeOutStart;\n      // fade in window: as section enters, top from vh → vh*0.4 maps to 0 → 1\n      let inOp = 1;\n      if(top > vh) inOp = 0;\n      else if(top < vh*0.4) inOp = 1;\n      else inOp = 1 - (top - vh*0.4) / (vh*0.6);\n      pin.style.opacity = Math.min(outOp, inOp).toFixed(3);\n    });\n  }\n  window.addEventListener('scroll', updatePins, {passive:true});\n  window.addEventListener('resize', updatePins);\n  updatePins();\n\n  /* ---- Reveal lines on scroll ---- */\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{\n      if(e.isIntersecting){\n        e.target.classList.add('in');\n      }\n    });\n  }, {threshold:0.25});\n  document.querySelectorAll('[data-reveal]').forEach(el=>io.observe(el));\n\n  /* ---- Word-by-word reveal ---- */\n  document.querySelectorAll('[data-words]').forEach(el=>{\n    const words = el.textContent.split(' ');\n    el.innerHTML = words.map((w,i)=>`<span class=\"w\" style=\"transition-delay:${i*60}ms\">${w}<\u002Fspan>`).join(' ');\n  });\n  const wio = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });\n  }, {threshold:0.4});\n  document.querySelectorAll('.reveal-words').forEach(el=>wio.observe(el));\n\n  /* ---- Italic grow on section-in-view (subtle) ---- */\n  const gio = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{\n      e.target.classList.toggle('in-view', e.isIntersecting);\n    });\n  }, {threshold:0.6});\n  document.querySelectorAll('.pinwrap .pin').forEach(el=>gio.observe(el));\n\n  /* ---- Side rail dots ---- */\n  const sections = [...document.querySelectorAll('[data-rail]')];\n  const rail = document.getElementById('rail');\n  sections.forEach((s,i)=>{\n    const a = document.createElement('a');\n    a.href = '#'; a.title = s.getAttribute('data-rail');\n    a.addEventListener('click',(e)=>{e.preventDefault();s.scrollIntoView({behavior:'smooth',block:'start'});});\n    rail.appendChild(a);\n  });\n  function syncRail(){\n    const links = rail.querySelectorAll('a');\n    let activeIdx = 0;\n    sections.forEach((s,i)=>{\n      const r = s.getBoundingClientRect();\n      if(r.top < window.innerHeight*0.4) activeIdx = i;\n    });\n    links.forEach((l,i)=>l.classList.toggle('active', i===activeIdx));\n  }\n  window.addEventListener('scroll', syncRail, {passive:true});\n  syncRail();\n\n  /* ---- Chips + form ---- */\n  function joinSubmit(){\n    const v = document.getElementById('hood').value.trim();\n    if(!v) return;\n    document.getElementById('thanks').style.opacity = '1';\n    document.getElementById('hood').value = '';\n    setTimeout(()=>{document.getElementById('thanks').style.opacity='0';},3500);\n  }\n\n  /* ---- Scroll progress ---- */\n  const prog = document.getElementById('progress');\n  function updateProgress(){\n    const h = document.documentElement.scrollHeight - window.innerHeight;\n    const p = h > 0 ? (window.scrollY / h) * 100 : 0;\n    prog.style.width = p + '%';\n  }\n  window.addEventListener('scroll', updateProgress, {passive:true});\n  window.addEventListener('resize', updateProgress);\n  updateProgress();\n\n  /* ---- Event RSVP toggle ---- */\n  document.querySelectorAll('.e-rsvp').forEach(b=>{\n    b.addEventListener('click',(e)=>{\n      e.stopPropagation();\n      b.classList.toggle('on');\n      b.textContent = b.classList.contains('on') ? 'bin dabei ♥' : 'ich komm';\n    });\n  });\n\n  function joinSubmit_OLD(form){\n    const v = document.getElementById('hood').value.trim();\n    if(!v) return;\n    document.getElementById('thanks').style.opacity = '1';\n    form.reset();\n    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));\n    setTimeout(()=>{document.getElementById('thanks').style.opacity='0';},3500);\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
